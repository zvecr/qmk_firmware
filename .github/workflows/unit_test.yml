name: Unit Tests

permissions:
  contents: read

on:
  push:
    branches:
    - master
    - develop
  pull_request:
    paths:
    - 'builddefs/**'
    - '!builddefs/docsgen/**'
    - 'quantum/**'
    - 'platforms/**'
    - 'tmk_core/**'
    - 'tests/**'
    - '*.mk'
    - 'Makefile'
    - '.github/workflows/unit_test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    container: ghcr.io/qmk/qmk_cli

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive

    - name: Install dependencies
      run: pip3 install -r requirements-dev.txt

    - name: Run tests
      run: qmk test-c -j $(nproc)

  test-clang:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install CLI
      run: pipx install qmk

    - name: Install dependencies
      run: pipx runpip qmk install -r requirements-dev.txt

    - name: Run tests
      run: qmk test-c -j1
